<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Home Decor — Play Now</title>
  <meta name="description" content="Design and decorate your dream home. Play Home Decor directly in your browser!" />
  <meta name="theme-color" content="#1a1025" />

  <!-- Open Graph -->
  <meta property="og:title" content="Home Decor — Play Now" />
  <meta property="og:description" content="Design and decorate your dream home. Play directly in your browser!" />
  <meta property="og:type" content="website" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f0b1a;
      --surface:   #1a1025;
      --accent:    #c97de8;
      --accent2:   #f2a65a;
      --text:      #f0eaf8;
      --muted:     #8a7a9e;
      --radius:    16px;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      font-family: 'Outfit', sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    /* ── Loading screen ─────────────────────────────── */
    #loading-screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: var(--bg);
      z-index: 100;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }
    #loading-screen.hidden { opacity: 0; visibility: hidden; }

    .loader-logo {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .loader-tagline {
      color: var(--muted);
      font-size: clamp(0.85rem, 2.5vw, 1rem);
      font-weight: 300;
      margin-bottom: 48px;
      letter-spacing: 0.05em;
    }

    .progress-wrap {
      width: min(320px, 70vw);
      background: rgba(255,255,255,0.07);
      border-radius: 100px;
      overflow: hidden;
      height: 6px;
      margin-bottom: 16px;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 100px;
      transition: width 0.3s ease;
      box-shadow: 0 0 12px rgba(201,125,232,0.6);
    }
    .progress-label {
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.08em;
    }

    /* animated dots */
    .dots::after {
      content: '';
      animation: dots 1.4s steps(3, end) infinite;
    }
    @keyframes dots {
      0%   { content: ''; }
      33%  { content: '.'; }
      66%  { content: '..'; }
      100% { content: '...'; }
    }

    /* floating orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: -1;
      animation: drift 8s ease-in-out infinite alternate;
    }
    .orb1 { width: 400px; height: 400px; background: rgba(201,125,232,0.15); top: -100px; left: -100px; animation-delay: 0s; }
    .orb2 { width: 300px; height: 300px; background: rgba(242,166,90,0.12); bottom: -80px; right: -80px; animation-delay: -4s; }
    @keyframes drift { from { transform: translate(0,0); } to { transform: translate(30px, 20px); } }

    /* ── Game container ─────────────────────────────── */
    #game-wrap {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: #000;
    }

    #unity-canvas {
      /* Portrait: cap to viewport height, respect 9:16 ratio */
      width:  min(100vw, calc(100vh * 9 / 16));
      height: min(100vh, calc(100vw * 16 / 9));
      display: block;
      touch-action: none;
    }

    /* Error overlay */
    #error-overlay {
      display: none;
      position: fixed; inset: 0;
      align-items: center; justify-content: center;
      flex-direction: column; gap: 12px;
      background: rgba(15,11,26,0.95);
      z-index: 200;
    }
    #error-overlay.visible { display: flex; }
    #error-overlay h2 { color: #f87171; font-size: 1.4rem; }
    #error-overlay p  { color: var(--muted); text-align: center; max-width: 320px; font-size: 0.9rem; line-height: 1.6; }
    .retry-btn {
      margin-top: 8px;
      padding: 12px 28px;
      border: none; border-radius: 100px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; font-family: inherit; font-size: 1rem; font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .retry-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(201,125,232,0.4); }
    .retry-btn:active { transform: translateY(0); }
  </style>
</head>
<body>

<!-- Loading screen -->
<div id="loading-screen">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="loader-logo">Home Decor</div>
  <div class="loader-tagline">Design your dream home</div>
  <div class="progress-wrap">
    <div class="progress-bar" id="progress-bar"></div>
  </div>
  <div class="progress-label">Loading<span class="dots"></span></div>
</div>

<!-- Error overlay -->
<div id="error-overlay">
  <h2>⚠️ Failed to Load</h2>
  <p>Something went wrong loading the game. Please check your connection and try again.</p>
  <button class="retry-btn" onclick="location.reload()">Retry</button>
</div>

<!-- Unity canvas -->
<div id="game-wrap">
  <canvas id="unity-canvas" tabindex="-1"></canvas>
</div>

<script>
  var buildUrl  = "Build";
  var loaderUrl = buildUrl + "/LocalWebGLBuild.loader.js";
  var config = {
    dataUrl:            buildUrl + "/LocalWebGLBuild.data.unityweb",
    frameworkUrl:       buildUrl + "/LocalWebGLBuild.framework.js.unityweb",
    codeUrl:            buildUrl + "/LocalWebGLBuild.wasm.unityweb",
    streamingAssetsUrl: "StreamingAssets",
    companyName:        "TSA",
    productName:        "HomeDecor",
    productVersion:     "0.2",
  };

  var canvas       = document.getElementById("unity-canvas");
  var loadingScreen = document.getElementById("loading-screen");
  var progressBar  = document.getElementById("progress-bar");
  var errorOverlay  = document.getElementById("error-overlay");

  var script = document.createElement("script");
  script.src  = loaderUrl;
  script.onerror = function() {
    loadingScreen.classList.add("hidden");
    errorOverlay.classList.add("visible");
  };
  script.onload = function() {
    createUnityInstance(canvas, config, function(progress) {
      progressBar.style.width = (100 * progress) + "%";
    }).then(function(unityInstance) {
      // Small delay so the 100% state is visible before fading out
      setTimeout(function() {
        loadingScreen.classList.add("hidden");
      }, 400);
    }).catch(function(message) {
      console.error("Unity load error:", message);
      loadingScreen.classList.add("hidden");
      errorOverlay.classList.add("visible");
    });
  };
  document.body.appendChild(script);
</script>
</body>
</html>
